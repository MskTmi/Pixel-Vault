    <script>
        const MARKER = "---PV-VAULT---";
        const MAGIC = new Uint8Array([0x50, 0x56, 0x4C, 0x54]); // "PVLT" — encrypted (single or multi)
        const PBKDF2_ITERATIONS = 150000;

        // Encryption toggle: show/hide password fields in both panels
        const encToggle = document.getElementById('enc-toggle');
        function syncPassVisibility() {
            const on = encToggle.checked;
            document.getElementById('encode-pass-wrap').classList.toggle('hidden', !on);
            document.getElementById('decode-pass-wrap').classList.toggle('hidden', !on);
        }
        encToggle.addEventListener('change', syncPassVisibility);
        syncPassVisibility();

        // Derive an AES-GCM 256-bit key from password + salt via PBKDF2
        async function deriveKey(password, salt) {
            const enc = new TextEncoder();
            const baseKey = await crypto.subtle.importKey(
                'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
                baseKey,
                { name: 'AES-GCM', length: 256 },
                false, ['encrypt', 'decrypt']);
        }

        // Detect encrypted format: file ends with 8-byte footer [offset u32 LE][magic 4B]
        function isEncrypted(u8) {
            if (u8.length < 8) return false;
            const tail = u8.length - 4;
            return u8[tail] === MAGIC[0] && u8[tail + 1] === MAGIC[1]
                && u8[tail + 2] === MAGIC[2] && u8[tail + 3] === MAGIC[3];
        }

        // Trigger downloads for one or more extracted files.
        // Multiple files are bundled into a ZIP archive (no third-party libs, store mode).
        async function downloadFiles(files) {
            if (files.length > 1) {
                const zip = makeZip(files);
                downloadBlob(zip, 'extracted.zip', 'application/zip');
            } else {
                for (const f of files) downloadBlob(f.bytes, f.name);
            }
        }

        function downloadBlob(bytes, filename, mime) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([bytes], mime ? { type: mime } : {}));
            a.download = filename;
            a.click();
            setTimeout(() => URL.revokeObjectURL(a.href), 1000);
        }

        // --- Minimal ZIP writer (store / no compression, UTF-8 filenames) ---
        const CRC_TABLE = (() => {
            const t = new Uint32Array(256);
            for (let n = 0; n < 256; n++) {
                let c = n;
                for (let k = 0; k < 8; k++) {
                    c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
                }
                t[n] = c >>> 0;
            }
            return t;
        })();

        function crc32(bytes) {
            let c = 0xFFFFFFFF;
            for (let i = 0; i < bytes.length; i++) {
                c = CRC_TABLE[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
            }
            return (c ^ 0xFFFFFFFF) >>> 0;
        }

        function makeZip(files) {
            const enc = new TextEncoder();
            const records = [];
            let offset = 0;
            let totalLen = 0;
            for (const f of files) {
                const nameBytes = enc.encode(f.name);
                const crc = crc32(f.bytes);
                const size = f.bytes.length;

                // Local file header (30 bytes + name)
                const lh = new Uint8Array(30 + nameBytes.length);
                const dv = new DataView(lh.buffer);
                dv.setUint32(0, 0x04034b50, true);   // signature
                dv.setUint16(4, 20, true);            // version needed
                dv.setUint16(6, 0x0800, true);        // flags: UTF-8 name
                dv.setUint16(8, 0, true);             // method: store
                dv.setUint16(10, 0, true);            // mod time
                dv.setUint16(12, 0x0021, true);       // mod date (1980-01-01)
                dv.setUint32(14, crc, true);
                dv.setUint32(18, size, true);         // compressed size
                dv.setUint32(22, size, true);         // uncompressed size
                dv.setUint16(26, nameBytes.length, true);
                dv.setUint16(28, 0, true);            // extra length
                lh.set(nameBytes, 30);

                // Central directory header (46 bytes + name)
                const ch = new Uint8Array(46 + nameBytes.length);
                const cv = new DataView(ch.buffer);
                cv.setUint32(0, 0x02014b50, true);
                cv.setUint16(4, 20, true);            // version made by
                cv.setUint16(6, 20, true);            // version needed
                cv.setUint16(8, 0x0800, true);        // flags: UTF-8
                cv.setUint16(10, 0, true);            // method: store
                cv.setUint16(12, 0, true);            // mod time
                cv.setUint16(14, 0x0021, true);       // mod date
                cv.setUint32(16, crc, true);
                cv.setUint32(20, size, true);
                cv.setUint32(24, size, true);
                cv.setUint16(28, nameBytes.length, true);
                cv.setUint16(30, 0, true);            // extra
                cv.setUint16(32, 0, true);            // comment len
                cv.setUint16(34, 0, true);            // disk number
                cv.setUint16(36, 0, true);            // internal attrs
                cv.setUint32(38, 0, true);            // external attrs
                cv.setUint32(42, offset, true);       // local header offset
                ch.set(nameBytes, 46);

                records.push({ lh, data: f.bytes, ch });
                totalLen += lh.length + f.bytes.length + ch.length;
                offset += lh.length + f.bytes.length;
            }

            const centralSize = totalLen - records.reduce((a, r) => a + r.lh.length + r.data.length, 0);

            // End of central directory record (22 bytes)
            const eocd = new Uint8Array(22);
            const ev = new DataView(eocd.buffer);
            ev.setUint32(0, 0x06054b50, true);
            ev.setUint16(4, 0, true);                 // disk number
            ev.setUint16(6, 0, true);                 // disk with central dir
            ev.setUint16(8, files.length, true);      // entries on this disk
            ev.setUint16(10, files.length, true);     // total entries
            ev.setUint32(12, centralSize, true);
            ev.setUint32(16, offset, true);           // central dir offset
            ev.setUint16(20, 0, true);                // comment length
            totalLen += 22;

            const out = new Uint8Array(totalLen);
            let p = 0;
            for (const r of records) {
                out.set(r.lh, p); p += r.lh.length;
                out.set(r.data, p); p += r.data.length;
            }
            for (const r of records) {
                out.set(r.ch, p); p += r.ch.length;
            }
            out.set(eocd, p);
            return out;
        }


        // File name display for mobile
        document.getElementById('img-input').addEventListener('change', function (e) {

        document.getElementById('decode-input').addEventListener('change', function (e) {
            const statusDiv = document.getElementById('decode-status');
            const nameSpan = document.getElementById('decode-name');
            if (e.target.files[0]) {

                statusDiv.classList.remove('hidden');
            } else {

                nameSpan.classList.add('text-gray-500');

                statusDiv.classList.add('hidden');

        function switchTab(tab) {
            const isEncode = tab === 'encode';
            document.getElementById('encode-panel').classList.toggle('hidden', !isEncode);
            document.getElementById('decode-panel').classList.toggle('hidden', isEncode);

            const encodeBtn = document.getElementById('tab-encode');
            const decodeBtn = document.getElementById('tab-decode');

            if (isEncode) {
                encodeBtn.className = "flex-1 py-2 text-sm font-bold rounded-lg bg-[#ff003c] text-white";
                decodeBtn.className = "flex-1 py-2 text-sm font-bold rounded-lg text-gray-400";
            } else {

                encodeBtn.className = "flex-1 py-2 text-sm font-bold rounded-lg text-gray-400";

        }



        async function handleEncode() {
            const btn = document.getElementById('encode-btn');
            const imgFile = document.getElementById('img-input').files[0];
            const secretFiles = Array.from(document.getElementById('file-input').files);
            const useEncryption = encToggle.checked;
            const password = document.getElementById('encode-pass').value;

            if (!imgFile || secretFiles.length === 0) {
                alert("Please select both a photo and at least one file to hide.");
                return;
            }
            if (useEncryption && !password) {
                alert("Please enter a password (or turn off encryption).");
                return;
            }

            btn.innerText = "PROCESSING...";

            try {
                const imgBuffer = await imgFile.arrayBuffer();
                const imgBytes = new Uint8Array(imgBuffer);

                // Read all secret files into memory
                const secrets = [];
                for (const f of secretFiles) {
                    const buf = await f.arrayBuffer();
                    secrets.push({ name: f.name, bytes: new Uint8Array(buf) });
                }

                // Multi-file payload includes the original (unmodified) photo as a backup,
                // since the carrier image gets altered during encoding.
                const zipEntries = [{ name: imgFile.name, bytes: imgBytes }, ...secrets];

                let combined;
                if (useEncryption) {
                    // Plaintext:
                    //   single file -> [nameLen u16 LE][name UTF8][bytes]   (same as legacy PVLT)
                    //   multi  file -> ZIP archive bytes (starts with PK\x03\x04)
                    let plaintext;
                    if (secrets.length === 1) {
                        const s = secrets[0];
                        const nb = new TextEncoder().encode(s.name);
                        plaintext = new Uint8Array(2 + nb.length + s.bytes.length);
                        plaintext[0] = nb.length & 0xff;
                        plaintext[1] = (nb.length >> 8) & 0xff;
                        plaintext.set(nb, 2);
                        plaintext.set(s.bytes, 2 + nb.length);
                    } else {
                        plaintext = makeZip(zipEntries);
                    }

                    const salt = crypto.getRandomValues(new Uint8Array(16));
                    const iv = crypto.getRandomValues(new Uint8Array(12));
                    const key = await deriveKey(password, salt);
                    const ciphertext = new Uint8Array(
                        await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, plaintext));

                    // Layout: img | MAGIC | salt(16) | iv(12) | ciphertext | offset u32 LE | MAGIC
                    const offset = imgBytes.length;
                    const total = imgBytes.length + 4 + 16 + 12 + ciphertext.length + 4 + 4;
                    combined = new Uint8Array(total);
                    let q = 0;
                    combined.set(imgBytes, q); q += imgBytes.length;
                    combined.set(MAGIC, q); q += 4;
                    combined.set(salt, q); q += 16;
                    combined.set(iv, q); q += 12;
                    combined.set(ciphertext, q); q += ciphertext.length;
                    combined[q++] = offset & 0xff;
                    combined[q++] = (offset >> 8) & 0xff;
                    combined[q++] = (offset >> 16) & 0xff;
                    combined[q++] = (offset >> 24) & 0xff;
                    combined.set(MAGIC, q);
                } else {
                    // Non-encrypted: img | MARKER + header + MARKER | payload
                    //   single file -> header = filename, payload = bytes (legacy compatible)
                    //   multi  file -> header = "ZIP",      payload = zip bytes
                    const markerBytes = new TextEncoder().encode(MARKER);
                    let headerStr, payload;
                    if (secrets.length === 1) {
                        headerStr = secrets[0].name;
                        payload = secrets[0].bytes;
                    } else {
                        headerStr = "ZIP";
                        payload = makeZip(zipEntries);
                    }
                    const headerBytes = new TextEncoder().encode(headerStr);
                    const meta = new Uint8Array(markerBytes.length * 2 + headerBytes.length);
                    meta.set(markerBytes, 0);
                    meta.set(headerBytes, markerBytes.length);
                    meta.set(markerBytes, markerBytes.length + headerBytes.length);
                    combined = new Uint8Array(imgBytes.length + meta.length + payload.length);
                    combined.set(imgBytes, 0);
                    combined.set(meta, imgBytes.length);
                    combined.set(payload, imgBytes.length + meta.length);
                }

                downloadBlob(combined, `hidden_${imgFile.name}`, imgFile.type);
                btn.innerText = "DONE!";
            } catch (err) {
                console.error(err);
                btn.innerText = "ERROR";
            }
            setTimeout(() => btn.innerText = "Download Hidden Image", 2000);
        }

        async function handleDecode() {
            const btn = document.getElementById('decode-btn');
            const file = document.getElementById('decode-input').files[0];
            if (!file) {
                alert("Select a photo first.");
                return;
            }

            btn.innerText = "EXTRACTING...";

            try {
                const buffer = await file.arrayBuffer();
                const u8 = new Uint8Array(buffer);
                const len = u8.length;

                if (isEncrypted(u8)) {
                    // Encrypted (PVL2) — single or multi file
                    // Force the encryption toggle ON and show password fields so the UI matches state
                    if (!encToggle.checked) {
                        encToggle.checked = true;
                        syncPassVisibility();
                    }
                    const passWrap = document.getElementById('decode-pass-wrap');
                    passWrap.classList.remove('hidden');
                    const password = document.getElementById('decode-pass').value;
                    if (!password) {
                        btn.innerText = "PASSWORD REQUIRED";
                        setTimeout(() => btn.innerText = "Extract Hidden File", 2000);
                        alert("This image is encrypted. Please enter the password.");
                        document.getElementById('decode-pass').focus();
                        return;
                    }

                    const offset = u8[len - 8] | (u8[len - 7] << 8) | (u8[len - 6] << 16) | ((u8[len - 5] << 24) >>> 0);
                    const payload = u8.slice(offset, len - 8);
                    // payload = MAGIC(4) | salt(16) | iv(12) | ciphertext
                    const salt = payload.slice(4, 20);
                    const iv = payload.slice(20, 32);
                    const ciphertext = payload.slice(32);

                    const key = await deriveKey(password, salt);
                    let plaintext;
                    try {
                        plaintext = new Uint8Array(
                            await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext));
                    } catch (e) {
                        btn.innerText = "ERROR: WRONG PASSWORD";
                        setTimeout(() => btn.innerText = "Extract Hidden File", 2000);
                        alert("Failed — wrong password or corrupted file.");
                        return;
                    }

                    // plaintext:
                    //   starts with PK\x03\x04 -> ZIP archive -> download as extracted.zip
                    //   otherwise              -> [nameLen u16][name][bytes] -> restore original file
                    if (plaintext.length >= 4
                        && plaintext[0] === 0x50 && plaintext[1] === 0x4B
                        && plaintext[2] === 0x03 && plaintext[3] === 0x04) {
                        downloadBlob(plaintext, 'extracted.zip', 'application/zip');
                        btn.innerText = "EXTRACTED ZIP!";
                    } else {
                        const nameLen = plaintext[0] | (plaintext[1] << 8);
                        const fileName = new TextDecoder().decode(plaintext.slice(2, 2 + nameLen));
                        const fileBytes = plaintext.slice(2 + nameLen);
                        downloadBlob(fileBytes, fileName);
                        btn.innerText = "SUCCESS!";
                    }
                } else {
                    // Non-encrypted MARKER format (single-file or multi-file)
                    const markerBytes = new TextEncoder().encode(MARKER);
                    const findMarker = (from) => {
                        for (let i = from; i <= u8.length - markerBytes.length; i++) {
                            let match = true;
                            for (let j = 0; j < markerBytes.length; j++) {
                                if (u8[i + j] !== markerBytes[j]) { match = false; break; }
                            }
                            if (match) return i;
                        }
                        return -1;
                    };

                    const idx1 = findMarker(0);
                    const idx2 = idx1 === -1 ? -1 : findMarker(idx1 + markerBytes.length);
                    if (idx1 === -1 || idx2 === -1) {
                        btn.innerText = "ERROR: NO DATA";
                        setTimeout(() => btn.innerText = "Extract Hidden File", 2000);
                        alert("No hidden file found in this image.");
                        return;
                    }

                    const headerStr = new TextDecoder().decode(u8.slice(idx1 + markerBytes.length, idx2));
                    const payload = u8.slice(idx2 + markerBytes.length);

                    if (headerStr === "ZIP") {
                        // Multi-file non-encrypted: payload is a ZIP archive
                        downloadBlob(payload, 'extracted.zip', 'application/zip');
                        btn.innerText = "EXTRACTED ZIP!";
                    } else {
                        // Legacy: header is the filename, payload is the single file
                        downloadBlob(payload, headerStr);
                        btn.innerText = "SUCCESS!";
                    }
                }
            } catch (err) {
                console.error(err);
                btn.innerText = "ERROR";
            }
            setTimeout(() => btn.innerText = "Extract Hidden File", 2000);
        }
    </script>

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .catch((err) => console.warn('SW registration failed:', err));
            });
        }
    </script>
